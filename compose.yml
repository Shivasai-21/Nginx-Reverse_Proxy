version: '3.9'

services:

  app1:
    build: ./app1
    container_name: app1-container
    restart: always

  app2:
    build: ./app2
    container_name: app2-container
    restart: always

  reverse-proxy:
    build: ./nginx
    container_name: nginx-reverse-proxy
    ports:
      - "80:80"
    depends_on:
      - app1
      - app2
    restart: always
